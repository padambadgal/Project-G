{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
    <div style="text-align: center;">
        <div style="font-size: 6rem; color: var(--red-primary); font-weight: 800;">404</div>
        <h1 style="color: var(--red-primary);">Page Not Found</h1>
        <p style="color: var(--dark-gray); font-size: 1.2rem;">The page you're looking for doesn't exist.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary" style="margin-top: 1rem;">
            <i class="fas fa-home"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
