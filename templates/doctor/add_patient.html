{% extends "base.html" %}

{% block title %}Add Patient - {{ app_name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="dashboard-header">
        <div>
            <h1><i class="fas fa-user-plus"></i> Add New Patient</h1>
            <p class="welcome-text">Register a new patient</p>
        </div>
        <div>
            <a href="{{ url_for('doctor_patients') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Patients
            </a>
        </div>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-user-plus"></i> Patient Information</h2>
        </div>
        
        <form method="POST" action="{{ url_for('doctor_add_patient') }}">
            <!-- Row 1: Full Name & Age -->
            <div class="form-row">
                <div class="form-group">
                    <label for="full_name">Full Name <span class="required">*</span></label>
                    <input type="text" id="full_name" name="full_name" class="form-control" 
                           placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label for="age">Age <span class="required">*</span></label>
                    <input type="number" id="age" name="age" class="form-control" 
                           placeholder="Age (1-120)" min="1" max="120" required>
                </div>
            </div>
            
            <!-- Row 2: Gender & Contact -->
            <div class="form-row">
                <div class="form-group">
                    <label for="gender">Gender <span class="required">*</span></label>
                    <select id="gender" name="gender" class="form-control" required>
                        <option value="">Select Gender</option>
                        <option value="Male">👨 Male</option>
                        <option value="Female">👩 Female</option>
                        <option value="Other">🧑 Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="contact">Contact <span class="required">*</span></label>
                    <input type="tel" id="contact" name="contact" class="form-control" 
                           placeholder="Phone number" required>
                </div>
            </div>
            
            <!-- Row 3: Address -->
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" class="form-control" 
                       placeholder="Patient's address">
            </div>
            
            <!-- Row 4: Medical History -->
            <div class="form-group">
                <label for="medical_history">Medical History</label>
                <textarea id="medical_history" name="medical_history" class="form-control" rows="3" 
                          placeholder="Any allergies, conditions, medications, etc."></textarea>
            </div>
            
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Save Patient
            </button>
        </form>
    </div>
</div>
{% endblock %}
