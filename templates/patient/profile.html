{% extends "base.html" %}

{% block title %}My Profile - {{ app_name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="dashboard-header">
        <div>
            <h1><i class="fas fa-user"></i> My Profile</h1>
        </div>
        <div>
            <a href="{{ url_for('patient_dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>
    
    {% if patient %}
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-edit"></i> Edit Profile</h2>
        </div>
        
        <form method="POST" action="{{ url_for('patient_update_profile') }}">
            <div class="form-row">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control" 
                           value="{{ patient.full_name }}">
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" class="form-control" 
                           value="{{ patient.age }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" class="form-control">
                        <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="contact">Contact</label>
                    <input type="tel" id="contact" name="contact" class="form-control" 
                           value="{{ patient.contact or '' }}">
                </div>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" class="form-control" 
                       value="{{ patient.address or '' }}">
            </div>
            <div class="form-group">
                <label for="medical_history">Medical History</label>
                <textarea id="medical_history" name="medical_history" class="form-control" rows="3">{{ patient.medical_history or '' }}</textarea>
            </div>
            
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Update Profile
            </button>
        </form>
    </div>
    {% else %}
    <div class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i> Profile not found. Please contact admin.
    </div>
    {% endif %}
</div>
{% endblock %}
