{% extends "base.html" %}

{% block title %}Register - AI Hospital System{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
{% endblock %}

{% block content %}
<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <h2><i class="fas fa-user-plus"></i> Register</h2>
            <p>Create your account</p>
        </div>
        
        <form id="registerForm" class="register-form" onsubmit="return false;">
            <!-- Basic Information -->
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username <span style="color: #c0392b;">*</span></label>
                <input type="text" id="username" name="username" required placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label for="full_name"><i class="fas fa-id-card"></i> Full Name <span style="color: #c0392b;">*</span></label>
                <input type="text" id="full_name" name="full_name" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password <span style="color: #c0392b;">*</span></label>
                <input type="password" id="password" name="password" required placeholder="Create a password (min 6 characters)">
            </div>
            
            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password <span style="color: #c0392b;">*</span></label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
            </div>
            
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="phone"><i class="fas fa-phone"></i> Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
            </div>
            
            <div class="form-group">
                <label for="gender"><i class="fas fa-venus-mars"></i> Gender</label>
                <select id="gender" name="gender">
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="age"><i class="fas fa-calendar"></i> Age</label>
                <input type="number" id="age" name="age" placeholder="Enter your age" min="1" max="150">
            </div>
            
            <div class="form-group">
                <label for="role"><i class="fas fa-user-tag"></i> Role <span style="color: #c0392b;">*</span></label>
                <select id="role" name="role" required>
                    <option value="">Select a role</option>
                    <option value="patient">Patient</option>
                    <option value="doctor">Doctor</option>
                </select>
            </div>
            
            <!-- Doctor Fields -->
            <div id="doctor-fields" style="display: none;">
                <hr style="border: 1px solid #c0392b; margin: 1.5rem 0;">
                <h3 style="color: #c0392b; margin: 1rem 0 0.5rem 0;">
                    <i class="fas fa-user-md"></i> Doctor Details
                </h3>
                <div class="form-group">
                    <label for="specialization">Specialization <span style="color: #c0392b;">*</span></label>
                    <input type="text" id="specialization" name="specialization" placeholder="e.g., Cardiologist">
                </div>
                
                <div class="form-group">
                    <label for="years_experience">Years of Experience</label>
                    <input type="number" id="years_experience" name="years_experience" placeholder="0" min="0">
                </div>
                
                <div class="form-group">
                    <label for="qualification">Qualification</label>
                    <input type="text" id="qualification" name="qualification" placeholder="e.g., MD, PhD">
                </div>
                
                <div class="form-group">
                    <label for="hospital_name">Hospital Name</label>
                    <input type="text" id="hospital_name" name="hospital_name" placeholder="Enter hospital name">
                </div>
                
                <div class="form-group">
                    <label for="consultation_fee">Consultation Fee ($)</label>
                    <input type="number" step="0.01" id="consultation_fee" name="consultation_fee" placeholder="0.00" min="0">
                </div>
                
                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" rows="3" placeholder="Tell us about yourself"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="available_days">Available Days</label>
                    <input type="text" id="available_days" name="available_days" placeholder="e.g., Mon-Fri">
                </div>
                
                <div class="form-group">
                    <label for="available_time">Available Time</label>
                    <input type="text" id="available_time" name="available_time" placeholder="e.g., 9:00 AM - 5:00 PM">
                </div>
            </div>
            
            <!-- Patient Fields -->
            <div id="patient-fields" style="display: none;">
                <hr style="border: 1px solid #2ecc71; margin: 1.5rem 0;">
                <h3 style="color: #2ecc71; margin: 1rem 0 0.5rem 0;">
                    <i class="fas fa-user-injured"></i> Patient Details
                </h3>
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" rows="2" placeholder="Enter your full address"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="medical_history">Medical History</label>
                    <textarea id="medical_history" name="medical_history" rows="3" placeholder="Enter any medical history (allergies, chronic conditions, surgeries, etc.)"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="emergency_contact">Emergency Contact</label>
                    <input type="text" id="emergency_contact" name="emergency_contact" placeholder="Name and phone number (e.g., John Doe - 1234567890)">
                </div>
                
                <div class="form-group">
                    <label for="blood_group">Blood Group</label>
                    <select id="blood_group" name="blood_group">
                        <option value="">Select blood group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>
        
        <div class="register-footer">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/register.js') }}"></script>
{% endblock %}
